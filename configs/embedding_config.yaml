# Embedding & retrieval configuration for the Clarify Engine RAG pipeline.
# Synchronised with docs/standards/embedding-model.md v1.1 (BL-16a, issue #87).
#
# NOTE: chunk_size / chunk_overlap intentionally remain 250 / 50 in Sprint 1
# (BL-16a is documentation + flags only). The migration to chunk_size=512 /
# overlap=64 happens in BL-16b after BL-06 ships in Sprint 2.

model_name: "BAAI/bge-m3"
max_length: 512
normalize_embeddings: true

# --- Chunking (current MVP values; will move to 512/64 in BL-16b) -------------
chunk_size: 250
chunk_overlap: 50
min_chunk_size: 200
max_chunk_size: 300

# --- Retrieval ----------------------------------------------------------------
top_k: 3
rrf_k: 60

# --- STRICT_MODE (BL-03, BL-16a, CONCEPT §7 R-01) -----------------------------
# When `strict_rag_mode: true`, the LLM call is skipped if the retriever
# returns no chunks OR if the top score is below `strict_min_score`. The
# pipeline returns a deterministic "не найдено" fallback instead of letting
# the LLM hallucinate from its weights.
strict_rag_mode: true
strict_min_score: 0.30

# --- Masking of the RAG channel (BL-04, BL-16a, NFR-04 / NFR-05) --------------
# When `mask_rag_context: true`, src/llm/client.py.generate_rag_response
# applies src/llm/masking.py.mask_context_chunks to every retrieved chunk
# before the prompt is built. Disabling this flag is only allowed in offline
# evaluation runs with synthetic data.
mask_rag_context: true

# --- Required chunk metadata schema (BL-02, BL-16a, NFR-02) -------------------
# Every chunk persisted in ChromaDB MUST carry the keys below. The indexer
# (knowledge_base/indexing/build_index.py) enforces this contract; missing
# keys are logged as schema warnings and counted against the realistic MVP
# threshold ``metadata_coverage_min`` (issue #90 — see
# docs/analysis/metadata-coverage-fix_v1.md). The NFR-02 stretch goal of
# 0.95 remains the long-term target tracked by the Golden Set (BL-05).
required_metadata:
  - source
  - chunk_idx
  - page_number
  - section_title
  - section_number
  - product

# --- Metadata coverage threshold (issue #90) ----------------------------------
# Minimum fraction of chunks that must carry every key in ``required_metadata``
# after a reindex. The MANGO OFFICE SaaS corpus has multi-page sections with
# headings only at the boundary, so the realistic floor after Section
# Propagation is 0.65 (vs. the long-term NFR-02 ideal of 0.95).
metadata_coverage_min: 0.65

# --- Section Propagation (issue #90) ------------------------------------------
# Stateful inheritance of ``section_title`` / ``section_number`` across chunks
# of the same document. When a chunk has no detectable heading it inherits the
# values from the most recent heading in the same file; the resulting chunk
# carries an audit flag ``section_inherited: true``. The page-distance fallback
# resets the inheritance state when more than ``max_page_distance`` pages have
# passed since the last detected heading, to prevent "ghost inheritance" across
# chapter boundaries that lack a numbered heading.
section_inheritance:
  enabled: true
  max_page_distance: 6

vector_store:
  type: "chromadb"
  persist_directory: "./chroma_data"
  collection_name: "clarify_engine_kb"
