active_provider: "deepseek"
use_test_data_mode: true

providers:
  deepseek:
    priority: 1
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    allowed_for_production: false
    temperature: 0.1
    retry_attempts: 3
  gigachat:
    priority: 2
    model: "GigaChat-Pro"
    credentials_env: "GIGACHAT_AUTH"
    allowed_for_production: true
    temperature: 0.1
    retry_attempts: 3

fallback_providers:
  - "deepseek"
  - "gigachat"
