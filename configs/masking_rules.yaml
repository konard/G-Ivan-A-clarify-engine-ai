# MVP masking patterns — issue #45 MUST 3.
# Scope per CONCEPT v2.1: ONLY Email, Phone (RU), IP, Domain.
# ФИО / legal entity / individual entrepreneur masking is intentionally
# deferred and MUST NOT be re-enabled without a separate decision.
patterns:
  - name: "email"
    regex: "\\b[A-Za-z0-9.!#$%&'*+/=?^_`{|}~-]+@(?:[A-Za-z0-9-]+\\.)+[A-Za-z]{2,}\\b"
    replacement: "[EMAIL]"
  - name: "phone_ru"
    regex: "(?<!\\d)(?:\\+7|8)[\\s\\-]?\\(?[0-9]{3}\\)?[\\s\\-]?[0-9]{3}[\\s\\-]?[0-9]{2}[\\s\\-]?[0-9]{2}(?!\\d)"
    replacement: "[PHONE]"
  - name: "ip_address"
    regex: "\\b(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\b"
    replacement: "[IP]"
  - name: "internal_domain"
    regex: "(?i)\\b(?:[a-z0-9-]+\\.)*(?:internal|corp|local)\\.[a-z]{2,}\\b"
    replacement: "[DOMAIN]"
# Reserved for parser-context audit only. Runtime masking does not skip these
# sections because FR-05 / NFR-05 require zero PII leakage in outgoing prompts.
exclude_sections:
  - "контактные данные заказчика"
  - "контактные данные исполнителя"
