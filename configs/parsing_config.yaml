# Конфигурация парсеров требований

# Расширения файлов, которые поддерживаются
allowed_extensions:
  - ".xlsx"
  - ".xls"
  - ".docx"

# Ключевые слова для поиска колонки с требованиями (по порядку приоритета)
column_keywords:
  - "Требование"
  - "Requirement"
  - "Описание"
  - "Поля, обязательные для заполнения"
  - "Требование заказчика"
  - "Суть"
  - "Наименование"
  - "Description"

# Настройки обработки текста
text_processing:
  trim: true              # Удалять пробелы по краям
  lowercase: false        # Приводить к нижнему регистру
  remove_empty: true      # Удалять пустые строки
  min_length: 5           # Минимальная длина требования (символов)

# Настройки логирования
logging:
  level: "INFO"
  format: "json"          # Формат логов: json или text
  output: "logs/parser.log"

# Путь к директории с входящими файлами (по умолчанию)
incoming_dir: "data/incoming"

# ---------------------------------------------------------------------------
# DOCX-парсер (issue #79, BL-18, CONCEPT.md v2.3 §4 FR-01)
# ---------------------------------------------------------------------------
# Декларативный блок, описывающий поведение DocxParser.
docx_parser:
  enabled: true            # выключатель парсера на уровне dispatcher (FR-01)
  min_length: 5            # минимальная длина атомарного требования
  # Эвристики для распознавания «заголовков-без-стилей» во flat-paragraph
  # документах (см. анализ docs/analysis/2026-05-17_analysis_tz-structure_samples.md §2.3).
  header_patterns:
    - '^\d+(\.\d+)*\s'        # 1. / 1.1 / 1.1.1 — нумерованные секции
    - '^[A-ZА-Я][A-ZА-Я\s\-]{4,}$'  # СТРОКА КАПСОМ длиной от 5 символов
  # Inline-маркеры, которые НЕ должны попадать в выгрузку как часть
  # текста требования (фиксируются отдельно в parallel-report через Ref).
  inline_markers:
    - '(без комментария БА)'
    - '[STATUS:'
    - '[CITATION:'
    - '[COMMENT:'
    - '[RUN_ID:'
    - '[CONFIDENCE:'
    - '[Ref:'
  list_marker_patterns:
    - '^\s*[-–—•]\s+'
    - '^\s*\d+[\.)]\s+'
    - '^\s*[a-zа-я][\.)]\s+'
  service_break_patterns:
    - '^\s*$'
    - '^\f+$'
    - '^[-–—\s]+$'
  read_list_styles: true    # учитывать List Paragraph / нумерованные списки
  split_on_line_breaks: true # разбивать ячейки таблиц и списки на атомарные строки
  flatten_tables: false     # таблицы в .docx обрабатываются отдельным проходом
  # Формат локатора, который DocxParser обязан проставлять каждому
  # извлечённому требованию (см. standards/export-markup.md §3).
  locator_format: "para_index"   # для абзацев; для таблиц — "table_row_col"
  # Безопасный режим: если парсер встречает признаки модификации
  # документа inline-маркерами (см. inline_markers выше), он
  # ОТКАЗЫВАЕТСЯ переиспользовать исходник и требует output_mode=create_new
  # (см. standards/export-markup.md §5, V-02).
  fail_on_inline_markers_in_source: true

# ---------------------------------------------------------------------------
# BL-59 — Requirement Atomization & Document Structure Recognition
# (issue #211, docs/research/2026-05-20_bl-59_requirement-parsing_v1.md)
# ---------------------------------------------------------------------------
# Конфигурация RequirementBoundaryDetector — пост-парсингового слоя,
# который распознаёт логические границы атомарных требований, наследует
# структурный контекст (заголовки, parent_id, cross-refs) и опционально
# валидирует границы через локальный LLM (qwen2.5:7b в Ollama).
#
# Контракт: detector работает поверх raw-блоков из DocxParser/ExcelParser
# и не меняет публичную сигнатуру `load_requirements_by_extension`.
# Все исходные ключи локатора сохраняются; новые ключи (section_number,
# section_title, parent_id, cross_refs, block_type, span) добавляются
# только если структурная информация распознана.
parsing:
  # Стратегия атомизации:
  #   - naive       — pass-through (поведение до BL-59, сохранено для CI).
  #   - structural  — rule-based: section detection, context propagation,
  #                   continuation merge, cross-ref extraction.
  #   - hybrid      — structural + опциональный LLM-чек границ
  #                   (активируется флагом use_llm_boundary_check).
  strategy: "structural"

  # Минимальная длина атомарного требования (символов). Блок короче порога
  # рассматривается как продолжение предыдущего, если у него нет маркера.
  min_requirement_length: 50

  # Максимальный размер контекстного окна (символов) для одного блока.
  # Используется для отсечения слишком длинных «склеек».
  max_context_window_chars: 4000

  # Хранить ли исходные фрагменты в locator.span для отладки и аудита.
  preserve_original_fragments: true

  # ----- LLM boundary validation (опциональный Слой 2) ----------------------
  # ВНИМАНИЕ: по умолчанию выключено. Включение требует доступного
  # локального Ollama (qwen2.5:7b) и добавляет ≤ 30 сек на 50-стр. документ.
  use_llm_boundary_check: false
  llm_model: "qwen2.5:7b"
  llm_timeout_seconds: 10
  llm_total_timeout_seconds: 30
  llm_temperature: 0.0
  llm_top_p: 1.0
  llm_seed: 42

  # ----- Эвристики structural-слоя ------------------------------------------
  # Регулярка распознавания нумерации разделов. Группа 1 — section_number,
  # группа 2 — заголовок/тело. Если остаток короткий и без requirement-
  # глаголов — блок классифицируется как heading.
  section_number_pattern: '^(\d+(?:\.\d+)*)\.?\s+(.+)'

  # Глаголы и термины, указывающие на атомарное требование (BL-22/BL-27).
  # Сравнение нечувствительно к регистру; ищется substring match.
  requirement_verbs:
    - "должен"
    - "должны"
    - "должна"
    - "должно"
    - "обеспеч"
    - "поддерж"
    - "предостав"
    - "позвол"
    - "иметь"
    - "выполн"
    - "автоматич"
    - "реализ"

  # Регулярки для распознавания перекрёстных ссылок («см. п. 7.4»,
  # «согласно разделу 9.1»). Все совпадения попадают в locator.cross_refs.
  cross_ref_patterns:
    - 'см\.?\s*(?:п\.?\s*|пункт\s*|раздел\s*)?(\d+(?:\.\d+)+)'
    - 'согласно\s*(?:п\.?\s*|пункту\s*|разделу\s*)?(\d+(?:\.\d+)*)'
    - 'в\s*соответствии\s*с\s*(?:п\.?\s*|пунктом\s*|разделом\s*)?(\d+(?:\.\d+)*)'

  # Максимальная длина текста заголовка (символов). Блоки с нумерацией и
  # длиной выше порога считаются атомарными требованиями, не заголовками.
  max_heading_length: 80
